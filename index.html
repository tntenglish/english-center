<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TNT English</title>
    
    <!-- Loading Screen Styles -->
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #f9fafb;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease;
      }
      
      #loading-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }
      
      .loading-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }
      
      .loading-logo-wrapper {
        width: 120px;
        height: 120px;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      
      /* Vòng tròn xoay */
      .loading-logo-wrapper::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 4px solid #e5e7eb;
        border-top-color: #2563eb;
        animation: spin 1s linear infinite;
      }
      
      .loading-logo-wrapper img {
        width: 70px;
        height: 70px;
        object-fit: contain;
        z-index: 1;
        animation: pulse 1.5s ease-in-out infinite;
      }
      
      .loading-title {
        font-size: 20px;
        font-weight: 600;
        color: #1f2937;
        margin-top: 8px;
      }
      
      .loading-sub {
        font-size: 14px;
        color: #9ca3af;
      }
      
      .loading-dots {
        display: flex;
        gap: 6px;
        margin-top: 8px;
      }
      
      .loading-dots span {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #2563eb;
        animation: bounce 1.4s ease-in-out infinite both;
      }
      
      .loading-dots span:nth-child(1) {
        animation-delay: -0.32s;
      }
      .loading-dots span:nth-child(2) {
        animation-delay: -0.16s;
      }
      .loading-dots span:nth-child(3) {
        animation-delay: 0s;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      @keyframes pulse {
        0%, 100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.05);
          opacity: 0.8;
        }
      }
      
      @keyframes bounce {
        0%, 80%, 100% {
          transform: scale(0);
        }
        40% {
          transform: scale(1);
        }
      }
    </style>
  </head>
  <body>
    <!-- Loading Screen -->
    <div id="loading-screen">
      <div class="loading-container">
        <div class="loading-logo-wrapper">
          <img src="/logo.png" alt="TNT English Logo" />
        </div>
        <div class="loading-title">TNT English</div>
        <div class="loading-sub">Đang tải ứng dụng</div>
        <div class="loading-dots">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <script>
      // Ẩn loading screen khi app đã sẵn sàng
      function hideLoadingScreen() {
        const loadingScreen = document.getElementById('loading-screen');
        if (loadingScreen) {
          loadingScreen.classList.add('hidden');
        }
      }

      // Khi trang đã load xong
      window.addEventListener('load', function() {
        setTimeout(hideLoadingScreen, 600);
      });

      // Dự phòng: ẩn sau 3 giây
      setTimeout(hideLoadingScreen, 3000);

      // Hiển thị lại loading khi refresh
      window.addEventListener('beforeunload', function() {
        const loadingScreen = document.getElementById('loading-screen');
        if (loadingScreen) {
          loadingScreen.classList.remove('hidden');
        }
      });
    </script>
  </body>
</html>
